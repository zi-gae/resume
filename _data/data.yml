          details: 마이리얼트립 숙소/투어/렌터카 상품 통합 플랫폼. MSA 아키텍처 설계부터 서브도메인 구조 정의까지 전체 프로젝트 메인테이너로서 기술 방향성 주도
        - subTitle: 아키텍처 설계 및 기여
