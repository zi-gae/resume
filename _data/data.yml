              - 컴포넌트당 useEffect 평균 1.2개로 감소, 관련 버그 리포트 80% 감소 (Jira 이슈 트래킹 기준)
            - LocalStorage 스키마 변경 시 기존 사용자 데이터 충돌로 에러율 급증
              - 버전 관리 가능한 LocalStorage 어댑터 모듈 설계로 하위 호환성 보장

    - role: TF / Frontend libs, DX Script
      company: 2021.12 - 2022.10
      projects:
        - subTitle: 기술스택
          details: TypeScript, React 17-18, React Query, Github Actions
        - subTitle: 프로젝트 소개 및 기여
          details: |
            - <b>Frontend libs</b>: FE 공통 모듈 모노레포 구축, 8개 프로젝트에서 공유 모듈 활용
            - <b>Setup script</b>: 신규 입사자 온보딩 자동화 스크립트로 셋업 시간 2시간 → 15분 단축 (온보딩 리트로 5회 실측 평균)
            - <b>Build script</b>: 환경 변수 자동 동기화 빌드 스크립트로 배포 실패율 30% → 2% 감소 (Jenkins 배포 로그 월별 실패율 추적)
            - <b>Actions</b>: 깃허브 이벤트 → 슬랙 알림 커스텀 액션 개발 및 Marketplace 배포 [Marketplace](https://github.com/marketplace/actions/myrealtrip-slack-notify)
        - subTitle: 트러블슈팅
          details: |
            - 공통 모듈 테스트 시 Lint + Jest 검사 시간 12분+ 소요로 CI 병목 발생 (Github Actions workflow 실행 로그 기준)
              - Barrel 파일 간 순환 참조로 모듈 해석 인스턴스 무한 생성 원인 규명
              - Barrel 파일 제거 + 직접 경로 import로 전환하여 빌드/테스트 시간 <b>12분 → 5분, 58% 단축</b> (CI 파이프라인 실행 시간 전후 비교)

