        - subTitle: 프로젝트 소개
          details: 마이리얼트립 리브랜딩에 맞춘 디자인 시스템 신규 구축. 컴포넌트 아키텍처 설계 및 배포 자동화를 주도하며 6개 프로덕트 팀에 일관된 UI/UX 제공
        - subTitle: 아키텍처 설계 및 기여
          details: |
            - Compound Component 패턴 기반 컴포넌트 아키텍처 설계로 재사용성 극대화
            - 웹뷰 네이티브 브릿지 컴포넌트(바텀시트, iOS DatePicker) 설계 및 구현
            - Conventional Commits 기반 자동 버전 범핑 + Changesets 배포 파이프라인 구축
            - 신입 개발자 페어 프로그래밍 리드 및 컴포넌트 QA 프로세스 정립
