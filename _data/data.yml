ignite:
  title: 이그나이트 / 2024.03 - Present
  info:
    - role: 현대, 기아, 제네시스 통합딜러포탈
      projects:
        - subTitle: 기술스택
          details: React 18, TypeScript, React Query, Turborepo, Datadog, i18n, GraphQL(Apollo Client)
        - subTitle: 프로젝트소개
          details: 전세계 현대, 기아, 제네시스 딜러들에게 제공하는 통합 포탈 및 관리 서비스
        - subTitle: 주요 기여
          details: |
            - GraphQL Federation 기반 다중 도메인 데이터를 프론트엔드에서 통합 소비하는 클라이언트 데이터 레이어 설계
              - 차량, 딜러, 계약 등 도메인별 서브그래프 데이터를 Apollo Client로 통합 조회하여 컴포넌트 단위 데이터 페칭 최적화
              - Fragment Colocation 패턴 도입으로 컴포넌트별 필요 데이터만 요청, 오버페칭 제거로 응답 페이로드 35% 감소 (Chrome DevTools Network 탭 비교)
            - React Hook Form + Zod 기반 복잡한 폼 검증 구조 설계
              - 다단계 폼 위저드의 상태 관리와 유효성 검증 통합
              - 비제어 컴포넌트 전환으로 폼 렌더링 성능 3배 향상 (React Profiler flamegraph 측정)
            - 번들 사이즈 분석 및 코드 스플리팅 전략 수립
              - Route 기반 동적 import와 React.lazy 적용으로 초기 JS 번들 35% 감소 (webpack-bundle-analyzer 전후 비교)
        - subTitle: 성능 최적화
          details: |
            - CloudFront 캐시 전략 수립으로 정적 자원 응답 시간 210ms → 85ms 단축 (CloudFront Real-time Metrics 대시보드 기준)
            - Prefetch 및 클라이언트 캐싱 메커니즘으로 페이지 전환 시 LCP 1.8s → 0.9s 달성 (Lighthouse CI 자동 측정 기준)
        - subTitle: 트러블슈팅
          details: |
            - MSA 환경에서 도메인별 인증 토큰이 달라 클라이언트 요청 실패률 증가
              - 통합 요청 모듈 설계: 토큰 만료 감지 → 자동 갱신 → 요청 재시도 흐름 구현
              - 요청 큐잉 시스템으로 토큰 갱신 중 동시 요청 최대 50건 안정적 처리 (Datadog 모니터링 기준 인증 성공률 99.7% 달성)
              - Race condition 방지를 위한 Mutex 패턴 적용, 중복 토큰 갱신 요청 제거
            - 글로벌 서비스에서 국가별 데이터 보호 규정(GDPR/CCPA) 대응 필요
              - 국가별 데이터 처리 정책을 프론트엔드 미들웨어로 구현하여 커네션트 레벨에서 처리
              - 리전별 CDN 캐시 파티셔닝으로 규정 준수하면서 캐시 히트율 92% 유지 (CloudFront Cache Statistics 기준)

    - role: SaaS형 Admin CMS(현대,기아,제네시스 원앱 어드민)
      projects:
        - subTitle: 기술스택
          details: Next.js 13, TypeScript, React Query, Turborepo, Datadog, i18n
        - subTitle: 프로젝트소개
          details: 원앱 고객을 위한 차량 관리 시스템 및 차량 등록 콘솔
        - subTitle: 주요 기여
          details: |
            - 차량 등록/인허가 워크플로우 UI 설계 및 상태 머신 기반 프로세스 관리 구현
            - SSR + 클라이언트 하이드레이션 최적화로 초기 로딩 시간 2.1s → 1.2s 단축 (Lighthouse Performance 측정 기준)
            - PDF 뷰어 컴포넌트 설계 및 구현
              - 가상 스크롤링 기반 대용량 문서(500p+) 렌더링 지원, 메모리 사용량 70% 절감 (Chrome DevTools Memory Profiler 힙 스냅샷 비교)
              - 문서 확대/축소, 회전, 페이지 이동, 주석 기능 등 제공
            - 역할 기반 접근 제어(RBAC) UI 구현으로 3개 브랜드 × 48개국 권한 매트릭스 관리
        - subTitle: DevOps 및 배포 파이프라인
          details: |
            - GitLab CI/CD 파이프라인 구축 및 운영
              - 태그 기반 자동 빌드 및 배포 프로세스 구축
              - 코드 품질 게이트웨이 통합 (린트, 테스트 커버리지 80% 이상 유지)
              - Blue-Green 배포 전략으로 무중단 배포 달성, 롤백 시간 5분 이내 (배포 로그 실측)
              - 배포 사이클 2주 → 3일로 단축 (GitLab CI/CD Analytics 기준)

    - role: 기아 인증 중고차
      projects:
        - subTitle: 기술스택
          details: Next.js 13, TypeScript, React Query, Turborepo
        - subTitle: 프로젝트소개
          details: 기아 공식 인증 중고차 검색 및 구매 플랫폼. SEO 전략 수립 및 성능 최적화 리드
        - subTitle: 주요 성과
          details: |
            - SSR + 구조화된 데이터(JSON-LD) 기반 SEO 최적화로 검색 노출 순위 평균 12단계 상승 (Google Search Console Position 측정)
            - 차량 상세 정보 페이지 로딩 성능 최적화로 초기 이탈률 18% 감소, 체류 시간 25% 증가 (Google Analytics Behavior Flow 분석)
            - 반응형 디자인 및 접근성(WCAG 2.1 AA) 표준 준수, 접근성 점수 67 → 94 개선 (Lighthouse Accessibility Audit 기준)
            - 지연 로딩 + next/image 최적화로 LCP 2.4s → 1.1s, CLS 0.25 → 0.05 달성 (Chrome UX Report 및 WebPageTest 측정)

experiences:
  title: 마이리얼트립 / 2021.03 - 2024.03
  info:
    - role: Staynet
      company: 2023.07 - 2023.10
      projects:
        - subTitle: 기술스택
          details: React 18, TypeScript, Redux, React Query, AntDesign, Webpack, Jenkins
        - subTitle: 프로젝트 소개
          details: 연동사 의존 서비스를 자체 플랫폼으로 전환하는 프로젝트. 복잡한 체이닝 폼 UI 설계 및 구현 담당
        - subTitle: 주요 기여
          details: |
            - 체이닝 폼 상태 관리 설계: 20단계 이상의 입력 플로우를 상태 머신 패턴으로 선언적으로 관리
            - 캘린더 컴포넌트 렌더링 구조 재설계로 셀 단위 렌더링 비용 85% 절감 (React Profiler 측정)
        - subTitle: 트러블슈팅
          details: |
            - table 태그 기반 캘린더에서 input 삽입 시 전체 리렌더링 발생 (Chrome DevTools Performance 탭 측정, 렌더링 시간 800ms+)
              - div 기반 가상화 구조로 변경 + React.memo 적용으로 120ms로 단축
              - row 단위 격리 렌더링으로 변경 영향 범위를 단일 행으로 제한
            - 입력 폼 30개+ 필드의 실시간 렌더링으로 인한 성능 저하
              - ContextAPI + Ref 기반 uncontrolled 패턴으로 전환, 렌더링 횟수 90% 감소 (React DevTools Profiler commit 횟수 비교)
            - Webpack HMR 사용 시 메모리 누수 발생 (Chrome DevTools Memory 탭 측정, 30분 내 힙 2GB+ 도달)
              - 힙 스냅샷 분석으로 Webpack hash 옵션에 의한 번들 누적 생성 원인 규명
              - 개발 환경 해당 옵션 제거로 메모리 안정화
        - subTitle: 성과
          details: 연동사 월 구독 비용 약 300만 원 절감, 상품 품질 개선으로 <b>전환율(CVR) 5% 상승</b> (내부 Analytics 대시보드 A/B 테스트 결과 기준)

    - role: 통합숙소
      company: 2022.11 - 2023.05
      projects:
        - subTitle: 기술스택
          details: Next.js 13, TypeScript, React Query, Turborepo, SWC, Sentry, Jenkins, Docker, AWS ECR/ECS/EC2, Lighthouse, Github Actions
        - subTitle: 프로젝트 소개
          details: 마이리얼트립 숙소/투어/렌터카 상품 통합 플랫폼. MSA 기반 서브도메인 구조의 프론트엔드 담당, 전체 프로젝트 메인테이너 역할 수행
        - subTitle: 주요 기여
          details: |
            - MSA 기반 서브도메인 구조의 프론트엔드 모듈 설계 및 의존성 정의
            - React Query 기반 캐싱 전략 수립: staleTime/cacheTime 최적화로 API 호출 40% 절감 (Datadog APM 요청 매트릭 전후 비교)
            - 쿼리스트링 ↔ UI 상태 양방향 싱크 아키텍처 설계 (deep-link 지원)
            - 신입 개발자 1명 멘토링: 일정 관리, 코드 리뷰, 페어 프로그래밍
            - PR 시 Lighthouse CI 기반 성능 회귀 방지 자동화 파이프라인 구축
        - subTitle: 트러블슈팅
          details: |
            - 로컬스토리지 기반 상태 훅이 탭 간 동기화되지 않아 결제 플로우 이탈 발생
              - StorageEvent + 커스텀 이벤트 기반 크로스 탭 동기화 훅 설계로 해결
            - @tanstack/react-virtual에서 Safari 크로스 브라우징 이슈 발생 (Sentry 에러 리포트 기준 iOS 유저 15% 영향)
              - 원인 분석 후 오픈소스 라이브러리에 직접 PR 제출하여 근본 해결
              - [https://github.com/TanStack/virtual/pull/518](https://github.com/TanStack/virtual/pull/518)
        - subTitle: 성과
          details: 숙소 상품 <b>GMV 월 7000만 원 증가</b>, 숙소 검색 → 예약 전환율 3.2% 개선 (내부 BI 대시보드 및 GA 퍼널 분석 기준)

    - role: 마이리얼트립 디자인시스템
      company: 2022.08 - 2023.11
      projects:
        - subTitle: 기술스택
          details: React, TypeScript, Emotion, framer-motion, Storybook, yarn berry
        - subTitle: 프로젝트 소개
          details: 마이리얼트립 리브랜딩에 맞춘 디자인 시스템 신규 구축. 컴포넌트 설계 및 배포 자동화 담당, 6개 프로덕트 팀에 일관된 UI/UX 제공
        - subTitle: 주요 기여
          details: |
            - Compound Component 패턴 기반 컴포넌트 설계로 재사용성 극대화
            - 웹뷰 네이티브 브릿지 컴포넌트(바텀시트, iOS DatePicker) 설계 및 구현
            - Conventional Commits 기반 자동 버전 범핑 + Changesets 배포 파이프라인 구축
            - 신입 개발자 페어 프로그래밍 리드 및 컴포넌트 QA 프로세스 정립
        - subTitle: 트러블슈팅
          details: |
            - Scroll prevent 기능이 iPad OS 13에서 미작동 (Sentry 에러 리포트 기준 해당 기기 사용자 8% 영향)
              - navigator.maxTouchPoints 기반 디바이스 분류 로직으로 해결, 영향 기기 100% 커버
            - 상호작용 컴포넌트 중첩 시 validateDOMNesting 에러 발생
              - ContextAPI 기반 컴포넌트 컴포지션 제약 시스템 설계로 빌드 타임에 에러 방지
              - 해결 과정을 기술 블로그로 공유: [https://www.zigae.com/react-nested-components/](https://www.zigae.com/react-nested-components/)

    - role: 렌터카 및 국내숙소 고도화
      company: 2021.10 - 2022.07
      projects:
        - subTitle: 기술스택
          details: TypeScript, React 17-18, React Query, Redux
        - subTitle: 프로젝트 소개
          details: 관리자 부재 상태의 숙소/렌터카 도메인을 인수하여 레거시 정리 및 코드 현대화 담당
        - subTitle: 주요 기여
          details: |
            - 레거시 코드베이스 전면 분석 후 점진적 리팩토링 로드맵 수립
            - 모바일/데스크탑 중복 컴포넌트 30개+ → 반응형 공통 컴포넌트 12개로 통합, 코드량 40% 감소 (cloc 코드 라인 측정 기준)
            - Suspense + ErrorBoundary 기반 선언적 에러 핸들링 구조 도입
            - Redux → React Query 점진적 마이그레이션으로 보일러플레이트 60% 제거 (git diff stat 코드 라인 비교)
        - subTitle: 트러블슈팅
          details: |
            - useEffect 남용(평균 컴포넌트당 5개+)으로 인한 무한 루프 및 디버깅 난이도 급증
