            - Scroll prevent가 iPad OS 13에서 미작동 (Sentry 기준 해당 기기 사용자 8%)
              - navigator.maxTouchPoints로 디바이스 구분하여 해결
            - 상호작용 컴포넌트 중첩 시 validateDOMNesting 에러
              - ContextAPI로 컴포넌트 중첩 제약을 두어 빌드 타임에 방지
              - 해결 과정 블로그 공유: [https://www.zigae.com/react-nested-components/](https://www.zigae.com/react-nested-components/)

    - role: 렌터카 및 국내숙소 고도화
      company: 2021.10 - 2022.07
      projects:
        - subTitle: 기술스택
          details: TypeScript, React 17-18, React Query, Redux
        - subTitle: 프로젝트 소개
          details: 관리자 부재 상태의 숙소/렌터카 도메인 인수, 레거시 정리 및 코드 현대화
        - subTitle: 주요 기여
          details: |
            - 레거시 코드 분석 후 점진적 리팩토링 로드맵 수립
            - Suspense + ErrorBoundary 기반 에러 핸들링 구조 도입
            - Redux -> React Query 마이그레이션으로 보일러플레이트 60% 제거 (git diff stat 기준)
        - subTitle: 트러블슈팅
          details: |
            - useEffect 남용(컴포넌트당 평균 3-4개+)으로 무한 루프 및 디버깅 어려움
              - hooks 기반 단방향 데이터 플로우로 재구성
              - 컴포넌트당 useEffect 평균 0.7개로 감소, useEffect 버그 약 80% 감소 (Jira 레이블 추적)
            - LocalStorage 스키마 변경 시 기존 데이터 충돌로 에러 증가
              - 버전 관리 가능한 LocalStorage 어댑터로 하위 호환성 보장

    - role: TF / Frontend libs, DX Script
      company: 2021.12 - 2022.10
      projects:
        - subTitle: 기술스택
          details: TypeScript, React 17-18, React Query, Github Actions
        - subTitle: 프로젝트 소개 및 기여
          details: |
            - <b>Frontend libs</b>: FE 공통 모듈 모노레포 구축, 8개 프로젝트에서 공유 모듈 활용
            - <b>Setup script</b>: 신규 입사자 온보딩 자동화 스크립트로 셋업 시간 2시간 -> 15분 단축 (온보딩 리트로 5회 실측 평균)
            - <b>Actions</b>: 깃허브 액션 이벤트 슬랙 알림 커스텀 액션 개발 및 Marketplace 배포 [Marketplace](https://github.com/marketplace/actions/myrealtrip-slack-notify)
        - subTitle: 트러블슈팅
          details: |
            - 공통 모듈 테스트 시 Lint + Jest 12분+ 소요로 CI 병목 (Actions workflow 로그 기준)
              - Barrel 파일 간 순환 참조로 모듈 해석 인스턴스 무한 생성 원인 파악
              - Barrel 파일 제거 + 직접 import로 전환, 빌드/테스트 시간 <b>12분 -> 5분</b> (CI 전후 비교)

