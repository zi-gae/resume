ignite:
  title: 현대자동차 / 2024.03 - Present
  info:
    - role: 현대, 기아, 제네시스 통합딜러포탈
      projects:
        - subTitle: 기술스택
          details: React 18, TypeScript, Node.js, GraphQL(Apollo Federation), React Query, Turborepo, Datadog, i18n
        - subTitle: 프로젝트소개
          details: 전세계 현대, 기아, 제네시스 딜러들에게 제공하는 통합 포탈 및 관리 서비스. 프론트엔드 아키텍처 설계 및 기술 의사결정 리드
        - subTitle: 아키텍처 설계 및 기술 리더십
          details: |
            - GraphQL Module Federation 기반 API Gateway 아키텍처 설계 및 도입
              - 차량, 딜러, 계약 등 도메인별 서브그래프를 Federation으로 통합하여 단일 엔드포인트 제공
              - 도메인 팀 간 독립적 스키마 배포 가능하게 하여 배포 충돌 제로 달성
              - N+1 쿼리 문제를 DataLoader 패턴으로 해결, API 응답 시간 평균 40% 개선 (Datadog APM Trace 분석 기준)
            - Node.js 기반 BFF(Backend for Frontend) 레이어 설계 및 구현
              - 클라이언트 요구사항에 최적화된 데이터 어그리게이션 레이어 구축
              - REST → GraphQL 점진적 마이그레이션 전략 수립 및 실행
        - subTitle: 주요 성과
          details: |
            - CloudFront 캐시 레이어 최적화로 글로벌 접근성 향상 및 응답 시간 210ms → 85ms 단축 (CloudFront Real-time Metrics 대시보드 기준)
            - React Hook Form + Zod 기반 복잡한 폼 검증 아키텍처 설계, 폼 렌더링 성능 3배 향상 (React Profiler flamegraph 측정)
            - Prefetch 및 클라이언트 캐싱 메커니즘으로 페이지 전환 시 LCP 1.8s → 0.9s 달성 (Lighthouse CI 자동 측정 기준)
            - 번들 사이즈 분석 및 코드 스플리팅 전략으로 초기 JS 번들 35% 감소 (webpack-bundle-analyzer 비교 분석)
        - subTitle: MSA 아키텍처 설계 및 트러블슈팅
          details: |
            - 멀티 도메인 인증 아키텍처 설계 및 통합 요청 모듈 구현
              - 토큰 만료 감지 및 자동 갱신 메커니즘 구현으로 인증 성공률 99.7% 달성 (Datadog 커스텀 메트릭 모니터링 기준)
              - 요청 큐잉 시스템으로 토큰 갱신 중 동시 요청 최대 50건 안정적 처리 (부하 테스트 시나리오 검증)
              - Race condition 방지를 위한 Mutex 패턴 적용, 중복 토큰 갱신 요청 제거
            - 글로벌 데이터 보호 규정 대응 아키텍처 설계
              - GDPR(유럽), CCPA(미국) 등 국가별 데이터 처리 정책 미들웨어 구현
              - 리전별 CDN 캐시 파티셔닝으로 규정 준수 & 캐시 히트율 92% 유지 (CloudFront Cache Statistics 리포트 기준)

    - role: SaaS형 Admin CMS(현대,기아,제네시스 원앱 어드민)
      projects:
        - subTitle: 기술스택
          details: Next.js 13, TypeScript, Node.js, GraphQL, React Query, Turborepo, Datadog, i18n
        - subTitle: 프로젝트소개
          details: 원앱 고객을 위한 차량 관리 시스템 및 차량 등록 콘솔. 프로젝트 기술 리드로서 아키텍처 설계 및 코드 리뷰 프로세스 주도
        - subTitle: 핵심 기여
          details: |
            - 차량 등록/인허가 워크플로우 전체 설계 및 상태 머신 기반 프로세스 관리 구현
            - Server-Side Rendering + 클라이언트 하이드레이션 최적화로 초기 로딩 시간 2.1s → 1.2s (Lighthouse Performance 측정, 43% 단축)
            - PDF 뷰어 컴포넌트 아키텍처 설계 및 구현
              - 가상 스크롤링 기반 대용량 문서(500p+) 렌더링 지원, 메모리 사용량 70% 절감 (Chrome DevTools Memory Profiler 힙 스냅샷 비교)
              - 문서 확대/축소, 회전, 페이지 이동, 주석 기능 등 제공
            - 역할 기반 접근 제어(RBAC) 시스템 설계로 3개 브랜드 × 48개국 권한 매트릭스 관리
        - subTitle: DevOps 및 배포 파이프라인 설계
          details: |
            - GitLab CI/CD 파이프라인 아키텍처 설계 및 구현
              - 태그 기반 자동 빌드 및 배포 프로세스 구축
              - 코드 품질 게이트웨이 통합 (린트, 테스트 커버리지 80% 이상 유지)
              - Blue-Green 배포 전략으로 무중단 배포 달성, 롤백 시간 5분 이내 (배포 로그 실측)
              - 배포 사이클 2주 → 3일로 78% 단축, 연간 배포 횟수 24회 → 120회 증가 (GitLab CI/CD Analytics 기준)

    - role: 기아 인증 중고차
      projects:
        - subTitle: 기술스택
          details: Next.js 13, TypeScript, React Query, Turborepo
        - subTitle: 프로젝트소개
          details: 기아 공식 인증 중고차 검색 및 구매 플랫폼. SEO 전략 수립 및 성능 최적화 리드
        - subTitle: 주요 성과
          details: |
            - SSR + 구조화된 데이터(JSON-LD) 기반 SEO 최적화로 검색 노출 순위 평균 12단계 상승 (Google Search Console Position 측정)
            - 차량 상세 정보 페이지 로딩 성능 최적화로 초기 이탈률 18% 감소, 체류 시간 25% 증가 (Google Analytics Behavior Flow 분석)
            - 반응형 디자인 및 접근성(WCAG 2.1 AA) 표준 준수, 접근성 점수 67 → 94 개선 (Lighthouse Accessibility Audit 기준)
            - 지연 로딩 + next/image 최적화로 LCP 2.4s → 1.1s, CLS 0.25 → 0.05 달성 (Chrome UX Report 및 WebPageTest 측정)

experiences:
  title: 마이리얼트립 / 2021.03 - 2024.03
  info:
    - role: Staynet
      company: 2023.07 - 2023.10
      projects:
        - subTitle: 기술스택
          details: React 18, TypeScript, Node.js, GraphQL, Redux, React Query, AntDesign, Webpack, Jenkins
        - subTitle: 프로젝트 소개
          details: 연동사 의존 서비스를 자체 플랫폼으로 전환하는 프로젝트. 기술 설계 및 구현 전반을 리드하며 복잡한 체이닝 폼 아키텍처와 Node.js 기반 데이터 연동 레이어 설계
        - subTitle: 아키텍처 설계 및 기여
          details: |
            - Node.js + GraphQL 기반 데이터 어그리게이션 API 설계로 연동사 API 호출 횟수 60% 절감 (서버 액세스 로그 전후 비교 분석)
            - 체이닝 폼 상태 머신 아키텍처 설계, 20단계 이상의 복잡한 입력 플로우를 선언적으로 관리
            - 캘린더 컴포넌트 렌더링 아키텍처 재설계로 셀 단위 렌더링 비용 85% 절감 (React Profiler 렌더링 측정)
        - subTitle: 트러블슈팅
          details: |
            - table 태그 기반 캘린더에서 input 삽입 시 전체 리렌더링 비용 급증 (Chrome DevTools Performance 탭 측정, 렌더링 시간 800ms+)
              - div 기반 가상화 구조로 변경 + React.memo 적용으로 렌더링 시간 120ms로 단축
              - row 단위 격리 렌더링으로 변경 영향 범위를 단일 행으로 제한
            - 입력 폼 상태 30개+ 필드의 실시간 렌더링으로 인한 성능 저하
              - ContextAPI + Ref 기반 uncontrolled 패턴으로 전환, 렌더링 횟수 90% 감소 (React DevTools Profiler commit 횟수 비교)
            - HMR 사용 시 메모리 누수 발생 (Chrome DevTools Memory 탭 측정, 30분 내 힙 메모리 2GB+ 도달)
              - 힙 스냅샷 분석으로 hash 옵션에 의한 번들 누적 생성 원인 규명
              - 개발 환경 해당 옵션 제거로 메모리 안정화, DX 생산성 회복
        - subTitle: 성과
          details: 연동사 월 구독 비용 약 300만 원 절감 및 상품 정보 품질 개선으로 <b>전환율(CVR) 5% 상승, 월 매출 약 2000만 원 증가</b> (내부 Analytics 대시보드 A/B 테스트 결과 기준)

    - role: 통합숙소
      company: 2022.11 - 2023.05
      projects:
        - subTitle: 기술스택
